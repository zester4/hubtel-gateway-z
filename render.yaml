services:
  - type: web
    name: hubtel-gateway
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GATEWAY_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HUBTEL_CLIENT_ID
        sync: false
      - key: HUBTEL_CLIENT_SECRET
        sync: false
      - key: HUBTEL_MERCHANT_ACCOUNT_NUMBER
        sync: false
      - key: HUBTEL_DISBURSEMENT_ACCOUNT_NUMBER
        sync: false
      - key: HUBTEL_CHECKOUT_BASE_URL
        value: https://payproxyapi.hubtel.com
      - key: HUBTEL_TXN_STATUS_BASE_URL
        value: https://api-txnstatus.hubtel.com
      - key: HUBTEL_SEND_STATUS_BASE_URL
        value: https://smrsc.hubtel.com
      - key: HUBTEL_SEND_MONEY_URL
        sync: false
      - key: HUBTEL_SEND_TO_BANK_URL_TEMPLATE
        sync: false
      - key: HUBTEL_DISBURSEMENT_BASE_URL
        sync: false
      - key: HUBTEL_CALLBACK_URL
        sync: false
      - key: HUBTEL_PREAUTH_CALLBACK_URL
        sync: false
      - key: HUBTEL_WEBHOOK_SECRET
        sync: false
      - key: HUBTEL_BANKS_URL
        sync: false
      - key: HUBTEL_BANK_VERIFY_URL
        sync: false
      - key: HUBTEL_RNV_BASE_URL
        value: https://rnv.hubtel.com
